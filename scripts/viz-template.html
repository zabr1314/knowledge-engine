    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid !== d.id && tid !== d.id;
  });
  link.classed('highlighted', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid === d.id || tid === d.id;
  });

  // Glow
  d3.select(event.currentTarget).select('circle:first-child')
    .attr('opacity', 0.6);

  // Tooltip
  document.getElementById('ttLevel').className = `tt-level ${d.level.toLowerCase()}`;
  document.getElementById('ttLevel').textContent = `${d.level} · ${d.confidence} confidence`;
  document.getElementById('ttTitle').textContent = d.label;
  document.getElementById('ttContext').textContent = d.context || '';
  document.getElementById('ttTags').innerHTML = d.tags.map(t =>
    `<span class="tt-tag">${t}</span>`).join('');
  document.getElementById('ttConfidence').textContent = 
    d.confidence === 'high' ? '🟢 高置信度' : d.confidence === 'medium' ? '🟡 中置信度' : '🔴 低置信度';
  
  tooltip.classList.add('visible');
  positionTooltip(event);
});

node.on('mousemove', positionTooltip);

node.on('mouseout', (event, d) => {
  node.classed('dimmed', false).classed('highlighted', false);
  link.classed('dimmed', false).classed('highlighted', false);
  d3.select(event.currentTarget).select('circle:first-child')
    .attr('opacity', 0);
  tooltip.classList.remove('visible');
});

// ─── Tick ───
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  edgeLabel
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + d.target.y) / 2 - 4);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// ─── Helpers ───
function getNodeRadius(d) {
  const base = d.level === 'L3' ? 16 : d.level === 'L2' ? 12 : 8;
  const connections = DATA.edges.filter(e => {
    const sid = typeof e.source === 'object' ? e.source.id : e.source;
    const tid = typeof e.target === 'object' ? e.target.id : e.target;
    return sid === d.id || tid === d.id;
  }).length;
  return base + connections * 2;
}

function truncate(str, max) {
  return str.length > max ? str.slice(0, max) + '…' : str;
}

function positionTooltip(event) {
  const x = event.clientX + 16;
  const y = event.clientY - 10;
  tooltip.style.left = (x + 360 > width ? x - 376 : x) + 'px';
  tooltip.style.top = Math.max(10, y) + 'px';
}

function applyFilter() {
  if (!activeTag) {
    node.attr('opacity', 1);
    link.attr('opacity', 1);
    edgeLabel.attr('opacity', 1);
    return;
  }
  const matching = new Set(DATA.nodes.filter(n => n.tags.includes(activeTag)).map(n => n.id));
  node.attr('opacity', d => matching.has(d.id) ? 1 : 0.1);
  link.attr('opacity', d => {
    const sid = typeof d.source === 'object' ? d.source.id : d.source;
    const tid = typeof d.target === 'object' ? d.target.id : d.target;
    return matching.has(sid) || matching.has(tid) ? 1 : 0.05;
  });
  edgeLabel.attr('opacity', 0.1);
}

function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Hide instructions after 5s
setTimeout(() => { document.getElementById('instructions').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
