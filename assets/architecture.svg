<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, SF Pro, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">📐 Skill 架构 — 三层渐进式披露</text>
  
  <!-- Level 1 -->
  <g transform="translate(400,85)">
    <rect x="-320" y="-25" width="640" height="50" rx="12" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
    <text x="-290" y="-5" fill="#60a5fa" font-size="11" font-weight="700">LEVEL 1</text>
    <text x="-290" y="12" fill="#999" font-size="10">YAML 元数据</text>
    <text x="-50" y="5" fill="#ccc" font-size="13" font-family="monospace">name: knowledge-engine | description: 个人知识引擎…</text>
    <rect x="200" y="-15" width="80" height="30" rx="6" fill="#60a5fa" opacity="0.15"/>
    <text x="240" y="5" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">~100 tokens</text>
  </g>
  <text x="140" y="90" fill="#4ade80" font-size="10">✓ 始终加载</text>
  
  <!-- Arrow -->
  <line x1="400" y1="115" x2="400" y2="140" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="430" y="132" fill="#555" font-size="9">触发时加载</text>
  
  <!-- Level 2 -->
  <g transform="translate(400,190)">
    <rect x="-320" y="-35" width="640" height="70" rx="12" fill="#2d1f4e" stroke="#a78bfa" stroke-width="1"/>
    <text x="-290" y="-15" fill="#a78bfa" font-size="11" font-weight="700">LEVEL 2</text>
    <text x="-290" y="2" fill="#999" font-size="10">SKILL.md 正文</text>
    <text x="-50" y="-10" fill="#ccc" font-size="11" font-family="monospace">什么时候用这个 Skill → 使用指南 → CLI 命令</text>
    <text x="-50" y="8" fill="#999" font-size="10" font-family="monospace">search / add / link / beliefs-decay / synthesis / visualize</text>
    <rect x="200" y="-25" width="100" height="30" rx="6" fill="#a78bfa" opacity="0.15"/>
    <text x="250" y="-5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">&lt; 5,000 tokens</text>
  </g>
  
  <!-- Arrow -->
  <line x1="400" y1="230" x2="400" y2="260" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="430" y="250" fill="#555" font-size="9">按需执行</text>
  
  <!-- Level 3 -->
  <g transform="translate(400,340)">
    <rect x="-320" y="-50" width="640" height="100" rx="12" fill="#3a2a1e" stroke="#f59e0b" stroke-width="1"/>
    <text x="-290" y="-30" fill="#f59e0b" font-size="11" font-weight="700">LEVEL 3+</text>
    <text x="-290" y="-13" fill="#999" font-size="10">脚本 & 资源（不占上下文）</text>
    
    <!-- Scripts -->
    <g transform="translate(-280,0)">
      <rect x="0" y="-5" width="130" height="40" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
      <text x="10" y="12" fill="#60a5fa" font-size="10" font-weight="600">📜 scripts/</text>
      <text x="10" y="27" fill="#666" font-size="9">concept_manager.py (900+ 行)</text>
    </g>
    <g transform="translate(-130,0)">
      <rect x="0" y="-5" width="120" height="40" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
      <text x="10" y="12" fill="#a78bfa" font-size="10" font-weight="600">🔬 scripts/</text>
      <text x="10" y="27" fill="#666" font-size="9">concept_synthesis.py</text>
    </g>
    <g transform="translate(10,0)">
      <rect x="0" y="-5" width="100" height="40" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
      <text x="10" y="12" fill="#4ade80" font-size="10" font-weight="600">🔌 scripts/</text>
      <text x="10" y="27" fill="#666" font-size="9">ke_api.py</text>
    </g>
    <g transform="translate(130,0)">
      <rect x="0" y="-5" width="100" height="40" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
      <text x="10" y="12" fill="#f59e0b" font-size="10" font-weight="600">📊 scripts/</text>
      <text x="10" y="27" fill="#666" font-size="9">visualize.py</text>
    </g>
    <g transform="translate(250,0)">
      <rect x="0" y="-5" width="110" height="40" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
      <text x="10" y="12" fill="#f472b6" font-size="10" font-weight="600">📚 resources/</text>
      <text x="10" y="27" fill="#666" font-size="9">schema 文档</text>
    </g>
    
    <rect x="200" y="-40" width="100" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
    <text x="250" y="-25" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">无限扩展</text>
  </g>
  
  <!-- Side annotations -->
  <g transform="translate(70,430)">
    <rect x="-50" y="-15" width="200" height="30" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="-35" y="5" fill="#666" font-size="10">🧠 认知空间 = Level 1 + 2</text>
  </g>
  <g transform="translate(70,470)">
    <rect x="-50" y="-15" width="200" height="30" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="0.5"/>
    <text x="-35" y="5" fill="#666" font-size="10">⚡ 执行空间 = Level 3+（外部）</text>
  </g>
  
  <text x="400" y="490" text-anchor="middle" fill="#444" font-size="10">Agent 只读 Level 1+2 · 脚本在外部执行 · 近似无限上下文</text>
</svg>
