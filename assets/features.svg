<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="-apple-system, SF Pro, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="300" fill="url(#bg)" rx="16"/>
  
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">⚡ 核心特性</text>
  
  <!-- Feature 1: 循环检测 -->
  <g transform="translate(135,100)">
    <rect x="-110" y="-45" width="220" height="90" rx="12" fill="#1a1a2e" stroke="#60a5fa" stroke-width="0.5" opacity="0.8"/>
    <text x="0" y="-22" text-anchor="middle" fill="#60a5fa" font-size="24">🔄</text>
    <text x="0" y="-2" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">循环检测</text>
    <text x="0" y="15" text-anchor="middle" fill="#888" font-size="10">添加时自动去重</text>
    <text x="0" y="30" text-anchor="middle" fill="#666" font-size="9">≥0.6 自动合并 · ≥0.4 警告</text>
  </g>
  
  <!-- Feature 2: 信念衰减 -->
  <g transform="translate(400,100)">
    <rect x="-110" y="-45" width="220" height="90" rx="12" fill="#1a1a2e" stroke="#a78bfa" stroke-width="0.5" opacity="0.8"/>
    <text x="0" y="-22" text-anchor="middle" fill="#a78bfa" font-size="24">💭</text>
    <text x="0" y="-2" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">信念时间衰减</text>
    <text x="0" y="15" text-anchor="middle" fill="#888" font-size="10">旧信念自动降权</text>
    <text x="0" y="30" text-anchor="middle" fill="#666" font-size="9">7天不变 · 14天降级 · 30天标记</text>
  </g>
  
  <!-- Feature 3: 自动蒸馏 -->
  <g transform="translate(665,100)">
    <rect x="-110" y="-45" width="220" height="90" rx="12" fill="#1a1a2e" stroke="#f59e0b" stroke-width="0.5" opacity="0.8"/>
    <text x="0" y="-22" text-anchor="middle" fill="#f59e0b" font-size="24">🏗️</text>
    <text x="0" y="-2" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">自动蒸馏</text>
    <text x="0" y="15" text-anchor="middle" fill="#888" font-size="10">L1→L2→L3 层级提炼</text>
    <text x="0" y="30" text-anchor="middle" fill="#666" font-size="9">事实 → 洞察 → 元规律</text>
  </g>
  
  <!-- Feature 4: 子Agent API -->
  <g transform="translate(135,220)">
    <rect x="-110" y="-35" width="220" height="70" rx="12" fill="#1a1a2e" stroke="#4ade80" stroke-width="0.5" opacity="0.8"/>
    <text x="0" y="-12" text-anchor="middle" fill="#4ade80" font-size="24">🔌</text>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">子 Agent API</text>
    <text x="0" y="24" text-anchor="middle" fill="#888" font-size="10">from ke_api import ke</text>
  </g>
  
  <!-- Feature 5: 可视化 -->
  <g transform="translate(400,220)">
    <rect x="-110" y="-35" width="220" height="70" rx="12" fill="#1a1a2e" stroke="#f472b6" stroke-width="0.5" opacity="0.8"/>
    <text x="0" y="-12" text-anchor="middle" fill="#f472b6" font-size="24">📊</text>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">交互式知识图谱</text>
    <text x="0" y="24" text-anchor="middle" fill="#888" font-size="10">D3.js 力导向图 · 悬浮详情 · 标签筛选</text>
  </g>
  
  <!-- Feature 6: 零依赖 -->
  <g transform="translate(665,220)">
    <rect x="-110" y="-35" width="220" height="70" rx="12" fill="#1a1a2e" stroke="#94a3b8" stroke-width="0.5" opacity="0.8"/>
    <text x="0" y="-12" text-anchor="middle" fill="#94a3b8" font-size="24">🛡️</text>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">零外部依赖</text>
    <text x="0" y="24" text-anchor="middle" fill="#888" font-size="10">纯 Python 标准库 · 可审计 · 可恢复</text>
  </g>
  
  <text x="400" y="290" text-anchor="middle" fill="#444" font-size="10">88% 评估通过 · v0.3.0 · MIT License</text>
</svg>
